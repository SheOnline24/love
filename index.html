<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0f0f0f;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
}

.container {
  text-align:center;
  padding:20px;
}

.chat {
  font-size:18px;
  margin-bottom:30px;
  min-height:60px;
}

.btn {
  padding:14px 22px;
  border-radius:14px;
  font-size:16px;
  border:none;
  cursor:pointer;
  transition:0.2s;
}

.ios { background:#007aff; }
.android { background:#2ecc71; }

.popup {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  display:none;
}
</style>
</head>

<body>

<div class="container">
  <div class="chat" id="chat"></div>
  <button class="btn" id="tgBtn">Join Telegram</button>
</div>

<div class="popup" id="popup">
  🎁 Bonus available!  
  <br><br>
  <button onclick="goCasino()">Get Bonus</button>
</div>

<script>
// --- ссылки
const TG = "https://t.me/+NFHjJC5nOndlZjky";
const DATING = "https://tone.affomelody.com/click?pid=6350&offer_id=25";
const CASINO = "https://onlinepnpbit.com/2Vi4txHl/";

// --- язык
let lang = (navigator.language || "en").slice(0,2);
if (!["en","ru","de","fr"].includes(lang)) lang = "en";

// --- тексты
const texts = {
  en:["She is online...","Waiting for your message 💬"],
  ru:["Она онлайн...","Ждёт твоё сообщение 💬"],
  de:["Sie ist online...","Wartet auf dich 💬"],
  fr:["Elle est en ligne...","Elle t'attend 💬"]
};

// --- чат
let i=0;
function typeChat(){
  if(i<texts[lang].length){
    document.getElementById("chat").innerText = texts[lang][i];
    i++;
    setTimeout(typeChat,1500);
  }
}
typeChat();

// --- кнопка стиль
const isIOS = /iphone|ipad/i.test(navigator.userAgent);
const btn = document.getElementById("tgBtn");
btn.classList.add(isIOS ? "ios" : "android");

// --- клик → Telegram
btn.onclick = () => {
  localStorage.setItem("clicked","1");
  window.location.href = TG;
};

// --- статистика
function getStats(){
  return JSON.parse(localStorage.getItem("stats")||"{}");
}
function saveStats(s){
  localStorage.setItem("stats",JSON.stringify(s));
}

// --- выбор оффера
function chooseOffer(){
  let stats = getStats();
  let d = stats.d || 1;
  let c = stats.c || 1;

  let total = d + c;

  let dWeight = 0.7 + (d/total)*0.5;
  let cWeight = 0.3 + (c/total)*0.5;

  let rand = Math.random();
  if(rand < dWeight/(dWeight+cWeight)){
    stats.d = d+1;
    saveStats(stats);
    return DATING;
  } else {
    stats.c = c+1;
    saveStats(stats);
    return CASINO;
  }
}

// --- редирект если не нажал
setTimeout(()=>{
  if(!localStorage.getItem("clicked")){
    window.location.replace(chooseOffer());
  }
}, 6000 + Math.random()*3000);

// --- exit popup
window.addEventListener("popstate", function(){
  document.getElementById("popup").style.display="block";
});

// --- казино кнопка
function goCasino(){
  window.location.href = CASINO;
}
</script>

</body>
</html>
