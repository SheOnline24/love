<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Online</title>
<style>
body{
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
  padding:40px;
}
#headerImg{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:10px;
  border:2px solid #ff2e63;
}
button{
  padding:14px 25px;
  font-size:18px;
  background:#ff2e63;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:20px;
  transition: transform 0.2s, box-shadow 0.3s;
}
#typing,#chat,#casinoPopup{
  display:none;
  margin-top:30px;
}
.message{
  background:#222;
  padding:12px;
  border-radius:10px;
  margin:10px auto;
  max-width:300px;
}
.online{
  color:#00ff9c;
  margin-top:10px;
  font-size:18px;
}
/* Плавное появление + подпрыгивание */
@keyframes popupBounce {
  0% {opacity:0; transform:translateY(-30px);}
  50% {opacity:1; transform:translateY(15px);}
  70% {transform:translateY(-5px);}
  100% {transform:translateY(0);}
}
/* Усиленное мерцание кнопки с градиентом */
@keyframes pulseGlow {
  0% { transform: scale(1); box-shadow: 0 0 10px #ff2e63; background: linear-gradient(45deg, #ff2e63, #ff6090); }
  25% { transform: scale(1.05); box-shadow: 0 0 20px #ff4a7b; background: linear-gradient(45deg, #ff4a7b, #ff7ba0); }
  50% { transform: scale(1.1); box-shadow: 0 0 25px #ff6090; background: linear-gradient(45deg, #ff6090, #ff90b0); }
  75% { transform: scale(1.05); box-shadow: 0 0 20px #ff4a7b; background: linear-gradient(45deg, #ff4a7b, #ff7ba0); }
  100% { transform: scale(1); box-shadow: 0 0 10px #ff2e63; background: linear-gradient(45deg, #ff2e63, #ff6090); }
}
#casinoPopup.show{
  display:block;
  animation: popupBounce 0.8s ease forwards;
}
#casinoBtn.pulseGlow{
  animation: pulseGlow 1.2s infinite;
}
</style>
</head>
<body>

<img id="headerImg" src="" alt="Online Girl">
<div class="online" id="onlineUsers"></div>

<div id="typing">
  <span id="typingText"></span>
</div>

<div id="chat">
  <div class="message" id="m1"></div>
  <div class="message" id="m2"></div>
  <div class="message" id="m3"></div>
  <button id="continueBtn"></button>
</div>

<div id="casinoPopup">
  <h2>🎁 Bonus available!</h2>
  <button id="casinoBtn">Get Bonus</button>
</div>

<script>
// ===== ОФФЕРЫ =====
const DATING="https://tone.affomelody.com/click?pid=6350&offer_id=25";
const CASINO="https://onlinepnpbit.com/2Vi4txHl/";

// ===== СЛУЧАЙНЫЕ ДЕВУШКИ =====
const girls=[
  "https://i.ibb.co/4dVn5rY/girl1.jpg",
  "https://i.ibb.co/dKg5c5x/girl2.jpg",
  "https://i.ibb.co/W0hj9F4/girl3.jpg",
  "https://i.ibb.co/SvJHcD1/girl4.jpg"
];
const headerImg=document.getElementById("headerImg");
headerImg.src=girls[Math.floor(Math.random()*girls.length)];

// ===== ЯЗЫКИ =====
const locales={
en:{typing:"She is typing...",m1:"Hey...",m2:"Are you alone?",m3:"Let's chat privately...",btn:"Continue chat",online:"users online"},
ru:{typing:"Она печатает...",m1:"Привет...",m2:"Ты один?",m3:"Давай пообщаемся...",btn:"Продолжить чат",online:"пользователей онлайн"}
};
const lang=navigator.language.split("-")[0];
const text=locales[lang]||locales.en;

// ===== ONLINE USERS =====
function updateOnline(){
  let users=120+Math.floor(Math.random()*60);
  document.getElementById("onlineUsers").innerText=users+" "+text.online;
}
updateOnline();
setInterval(updateOnline,5000);

// ===== TYPING =====
const typing=document.getElementById("typing");
typing.style.display="block";
document.getElementById("typingText").innerText=text.typing;
setTimeout(startChat,2000);

// ===== CHAT =====
function startChat(){
  typing.style.display="none";
  const chat=document.getElementById("chat");
  chat.style.display="block";
  setTimeout(()=>{document.getElementById("m1").innerText=text.m1;},800);
  setTimeout(()=>{document.getElementById("m2").innerText=text.m2;},2000);
  setTimeout(()=>{document.getElementById("m3").innerText=text.m3;},3500);
}
document.getElementById("continueBtn").innerText=text.btn;

// ===== ПЕРЕХОД НА DATING =====
document.getElementById("continueBtn").onclick=function(){
  localStorage.setItem("dating_click","1");
  window.location.href=DATING;
};

// ===== ПОКАЗ КАЗИНО =====
function showCasino(){
  const casino=document.getElementById("casinoPopup");
  casino.classList.add("show");
  document.getElementById("casinoBtn").classList.add("pulseGlow");
}

// ===== РАНДОМНЫЙ ПОКАЗ КАЗИНО =====
let delay=8000+Math.random()*6000;
setTimeout(showCasino,delay);

// ===== ПОКАЗ КАЗИНО ПРИ ВОЗВРАТЕ С DATING =====
function handleReturn(){
  if(localStorage.getItem("dating_click")){
    localStorage.removeItem("dating_click");
    showCasino();
  }
}
window.addEventListener("focus",()=>{ setTimeout(handleReturn,100); });
document.addEventListener("visibilitychange",()=>{ if(!document.hidden) setTimeout(handleReturn,100); });
window.addEventListener("pageshow",()=>{ setTimeout(handleReturn,100); });

// ===== КАЗИНО КНОПКА =====
document.getElementById("casinoBtn").onclick=function(){
  window.location.href=CASINO;
};

// ===== TITLE ANIMATION =====
const titles=["Online","● New message 💬","She is typing...","Online"];
let i=0;
setInterval(function(){
  document.title=titles[i];
  i++;
  if(i>=titles.length){i=0;}
},2000);

</script>
</body>
</html>
