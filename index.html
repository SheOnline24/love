<!DOCTYPE html><html>
<head><meta charset="UTF-8"><meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0"><title>Loading...</title><script>

var offers = [
"https://tone.affomelody.com/click?pid=6350&offer_id=25",
"https://onlinepnpbit.com/2Vi4txHl/"
];

// стартовые веса
var weights = JSON.parse(localStorage.getItem("weights")) || [50,50];

function chooseOffer(){

var sum = weights[0] + weights[1];
var r = Math.random()*sum;

if(r < weights[0]) return 0;
return 1;

}

function updateLearning(id){

// если пользователь вернулся назад
// уменьшаем вес оффера

weights[id] = Math.max(10, weights[id]-5);

// увеличиваем второй
var other = id === 0 ? 1 : 0;
weights[other] += 5;

localStorage.setItem("weights", JSON.stringify(weights));

}

function redirect(){

var id = chooseOffer();

localStorage.setItem("last_offer", id);

var url = offers[id] + "?r=" + Math.random();

window.location.replace(url);

}

// если пользователь вернулся назад
window.onpageshow = function(){

var last = localStorage.getItem("last_offer");

if(last !== null){
updateLearning(parseInt(last));
}

}

redirect();

</script></head><body>Loading...

</body>
</html>
