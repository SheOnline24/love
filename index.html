<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

header{
width:120px;
height:120px;
margin:auto;
border-radius:50%;
overflow:hidden;
border:3px solid #00ff9c;
}

header img{
width:100%;
height:100%;
object-fit:cover;
}

#chat{
margin-top:30px;
}

.message{
background:#222;
padding:10px;
border-radius:10px;
margin:8px auto;
max-width:260px;
font-size:14px;
opacity:0;
transform:translateY(10px);
animation:fade 0.5s forwards;
}

@keyframes fade{
to{
opacity:1;
transform:translateY(0);
}
}

#typing{
display:none;
margin-top:10px;
color:#aaa;
}

button{
padding:14px 25px;
font-size:18px;
background:#ff2e63;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:20px;
display:none;
}

#casinoPopup{

position:fixed;
bottom:20px;
right:20px;
background:#222;
padding:12px 20px;
border-radius:12px;
box-shadow:0 0 15px rgba(255,46,99,0.7);
opacity:0;
transform:scale(0.8);
transition:0.4s;
cursor:pointer;

}

#casinoPopup.show{

opacity:1;
transform:scale(1);

}

</style>

</head>

<body>

<header>
<img id="avatar">
</header>

<div id="typing">typing...</div>

<div id="chat"></div>

<button id="continue">Continue chat</button>

<div id="casinoPopup">

function showMessage(text){

function startChat(){

let casino=document.getElementById("casinoPopup");

setTimeout(()=>{

}

</script>

</body>
</html>
