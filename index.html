<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.box {
  padding:20px;
}

.msg {
  background:#1e293b;
  margin:10px;
  padding:12px;
  border-radius:10px;
  text-align:left;
  animation:fade 0.5s;
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}

.button {
  position:fixed;
  bottom:0;
  width:100%;
  padding:22px;
  font-size:22px;
  background:linear-gradient(135deg,#0088cc,#00bfff);
  color:white;
  border:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box" id="chat"></div>

<script>

// --- язык
const lang = (navigator.language || "en").toLowerCase();

// --- определяем источник
const ua = navigator.userAgent.toLowerCase();

let source = "default";

if (ua.includes("telegram")) source = "telegram";
else if (ua.includes("tiktok")) source = "tiktok";
else if (ua.includes("facebook") || ua.includes("fb")) source = "facebook";

// --- тексты
const texts = {
  ru: {
    telegram: [
      "📲 Вы перешли из Telegram",
      "🔥 Закрытый доступ активен",
      "💬 Контент доступен после входа",
      "⚡ Не упусти доступ"
    ],
    tiktok: [
      "🎥 Видео набирает популярность",
      "🔥 Ссылка доступна ограниченное время",
      "💬 Продолжение внутри",
      "⚡ Жми пока не закрыли"
    ],
    facebook: [
      "📘 Вы пришли из Facebook",
      "🔥 Предложение ограничено",
      "💬 Доступ открыт сейчас",
      "⚡ Успей зайти"
    ],
    default: [
      "🔥 Доступ ограничен",
      "💬 Осталось мало мест",
      "🎰 Бонус после входа",
      "⚡ Жми сейчас"
    ],
    btn: "ПОЛУЧИТЬ ДОСТУП"
  },

  en: {
    telegram: [
      "📲 You came from Telegram",
      "🔥 Private access available",
      "💬 Content unlocks after entry",
      "⚡ Don’t miss it"
    ],
    tiktok: [
      "🎥 This is trending now",
      "🔥 Link available for limited time",
      "💬 Full access inside",
      "⚡ Tap before it's gone"
    ],
    facebook: [
      "📘 You came from Facebook",
      "🔥 Limited offer",
      "💬 Access is open now",
      "⚡ Join quickly"
    ],
    default: [
      "🔥 Limited access",
      "💬 Few spots left",
      "🎰 Bonus after entry",
      "⚡ Join now"
    ],
    btn: "GET ACCESS"
  }
};

const t = lang.startsWith("ru") ? texts.ru : texts.en;

// выбираем сообщения
const messages = t[source] || t.default;

// --- вывод "чата"
let i = 0;
function showMsg() {
  if (i < messages.length) {
    let div = document.createElement("div");
    div.className = "msg";
    div.innerText = messages[i];
    document.getElementById("chat").appendChild(div);
    i++;
    setTimeout(showMsg, 700);
  }
}

showMsg();

// --- кнопка
let btn = document.createElement("button");
btn.className = "button";
btn.innerText = t.btn;

btn.onclick = () => {
  window.location.href = "https://onlinepnpbit.com/2Vi4txHl/";
};

document.body.appendChild(btn);

// --- авто редирект
setTimeout(()=>{
  window.location.href = "https://onlinepnpbit.com/2Vi4txHl/";
}, 6000);

</script>

</body>
</html>
