<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control" content="no-store">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Online</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:50px;
}

button{
padding:14px 25px;
font-size:18px;
background:#ff2e63;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:15px;
}

#chat,#fakeTyping,#returnBlock,#fakeChat,#casinoPopup{
display:none;
margin-top:30px;
}

.fakeTyping{
font-style:italic;
color:#aaa;
}

</style>
</head>

<body>

<h1>She is online...</h1>

<div id="chat">

<p>Waiting for your message</p>

<button id="joinTelegram">
Join Telegram
</button>

</div>


<div id="fakeTyping" class="fakeTyping"></div>


<div id="returnBlock">

<h2></h2>
<p></p>

<button id="continueWithoutStars"></button>

</div>


<div id="fakeChat">

<p>💬 Hey...</p>
<p>💬 Are you there?</p>
<p>💬 I can't answer in Telegram...</p>

<button id="continueFromChat"></button>

</div>


<div id="casinoPopup">

<h2>🎁 Bonus available!</h2>

<button id="getCasinoBonus">
Get Bonus
</button>

</div>


<script>


// ===== ТВОИ ОФФЕРЫ =====

const DATING="https://tone.affomelody.com/click?pid=6350&offer_id=25";

const CASINO="https://onlinepnpbit.com/2Vi4txHl/";




// ===== ЯЗЫК =====

const locales={

en:{typing:"She is typing...",star:"⭐ Telegram Stars required",nostars:"You don't have Stars",cont:"Continue without Stars",chat:"Continue chat"},

ru:{typing:"Она печатает...",star:"⭐ Требуются Telegram Stars",nostars:"У тебя нет Stars",cont:"Продолжить без Stars",chat:"Продолжить чат"},

de:{typing:"Sie tippt...",star:"⭐ Telegram Stars erforderlich",nostars:"Du hast keine Stars",cont:"Ohne Stars fortfahren",chat:"Chat fortsetzen"},

fr:{typing:"Elle écrit...",star:"⭐ Telegram Stars requis",nostars:"Tu n'as pas de Stars",cont:"Continuer sans Stars",chat:"Continuer chat"},

es:{typing:"Ella está escribiendo...",star:"⭐ Se requieren Telegram Stars",nostars:"No tienes Stars",cont:"Continuar sin Stars",chat:"Continuar chat"},

it:{typing:"Sta scrivendo...",star:"⭐ Telegram Stars richiesti",nostars:"Non hai Stars",cont:"Continua senza Stars",chat:"Continua chat"}

};


const lang=navigator.language.split("-")[0];

const text=locales[lang]||locales.en;



document.getElementById("fakeTyping").innerText=text.typing;

const returnBlock=document.getElementById("returnBlock");

returnBlock.querySelector("h2").innerText=text.star;

returnBlock.querySelector("p").innerText=text.nostars;

document.getElementById("continueWithoutStars").innerText=text.cont;

document.getElementById("continueFromChat").innerText=text.chat;




// ===== TELEGRAM =====

let tgTime=null;

const chat=document.getElementById("chat");

chat.style.display="block";


document.getElementById("joinTelegram").onclick=function(){

tgTime=Date.now();

localStorage.setItem("tg_time",tgTime);

window.location.href="https://t.me/+NFHjJC5nOndlZjky";

};




// ===== ПРОВЕРКА ВОЗВРАТА =====

function checkReturn(){

const stored=localStorage.getItem("tg_time");

if(stored){

if(Date.now()-stored>1500){

showReturn();

localStorage.removeItem("tg_time");

}

}

}


window.addEventListener("load",checkReturn);

document.addEventListener("visibilitychange",function(){

if(!document.hidden){

setTimeout(checkReturn,300);

}

});

window.addEventListener("focus",function(){

setTimeout(checkReturn,300);

});

setInterval(checkReturn,2000);




// ===== БЛОК ВОЗВРАТА =====

function showReturn(){

chat.style.display="none";

const typing=document.getElementById("fakeTyping");

typing.style.display="block";

setTimeout(function(){

typing.style.display="none";

returnBlock.style.display="block";

},2000);

}




// ===== CONTINUE WITHOUT STARS =====

document.getElementById("continueWithoutStars").onclick=function(){

returnBlock.style.display="none";

document.getElementById("fakeChat").style.display="block";

};




// ===== CONTINUE CHAT =====

document.getElementById("continueFromChat").onclick=function(){

document.getElementById("fakeChat").style.display="none";

document.getElementById("casinoPopup").style.display="block";


// автослив на dating

setTimeout(function(){

window.location.href=DATING;

},5000);

};




// ===== CASINO =====

document.getElementById("getCasinoBonus").onclick=function(){

window.location.href=CASINO;

};




// ===== TITLE ANIMATION =====

const titles=["Online","● She is typing...","New message 💬","Online"];

let i=0;

setInterval(function(){

document.title=titles[i];

i++;

if(i>=titles.length){i=0;}

},2000);



</script>

</body>

</html>
