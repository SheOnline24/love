<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online</title>
<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  text-align:center;
  padding:40px;
}
header{
  width:100%;
  height:150px;
  margin-bottom:20px;
  border-radius:12px;
  overflow:hidden;
  position:relative;
}
header img{
  width:100%;
  height:100%;
  object-fit:cover;
}
button{
  padding:14px 25px;
  font-size:18px;
  background:#ff2e63;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:20px;
  transition: all 0.5s ease;
}
#typing,#chat{
  display:none;
  margin-top:30px;
}
.message{
  background:#222;
  padding:12px;
  border-radius:10px;
  margin:10px auto;
  max-width:300px;
}
.online{
  color:#00ff9c;
  margin-top:10px;
}

/* ===== КАЗИНО БАННЕР ===== */
#casinoPopup{
  position: fixed;
  bottom:20px;
  right:20px;
  background:#1a1a1a;
  padding:15px 20px;
  border-radius:10px;
  box-shadow: 0 0 15px rgba(255,46,99,0.4);
  width:200px;
  opacity:0;
  transform: translateY(100%) scale(0.8);
  transition: opacity 0.5s ease;
  z-index:999;
}
#casinoPopup.show{
  opacity:1;
  animation: bounceCorner 0.8s ease forwards;
}
@keyframes bounceCorner {
  0% { transform: translateY(100%) scale(0.8); }
  60% { transform: translateY(-10px) scale(1.05); }
  80% { transform: translateY(5px) scale(0.95); }
  100% { transform: translateY(0) scale(1); }
}
#casinoBtn.pulse{
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 8px rgba(255,46,99,0.3);}
  50% { box-shadow: 0 0 15px rgba(255,46,99,0.5);}
  100% { box-shadow: 0 0 8px rgba(255,46,99,0.3);}
}
</style>
</head>
<body>

<header id="headerPhoto"><img src="" alt="Profile"></header>

<div class="online" id="onlineUsers"></div>

<div id="typing">
  <span id="typingText"></span>
</div>

<div id="chat">
  <div class="message" id="m1"></div>
  <div class="message" id="m2"></div>
  <div class="message" id="m3"></div>
  <button id="continueBtn"></button>
</div>

<div id="casinoPopup">
  <h2>🎁 Bonus available!</h2>
  <button id="casinoBtn">Get Bonus</button>
</div>

<script>
// ===== ОФФЕРЫ =====
const DATING="https://tone.affomelody.com/click?pid=6350&offer_id=25";
const CASINO="https://onlinepnpbit.com/2Vi4txHl/";

// ===== ФОТО ДЕВУШЕК =====
const photos=[
"https://avatars.mds.yandex.net/i?id=18d21c015ad863434f710614c479adb3_l-5331866-images-thumbs&n=33&w=710&h=1263",
"https://avatars.mds.yandex.net/i?id=2f068b39e7edee0378ca03431b5d7bb9_l-4146308-images-thumbs&n=13",
"https://avatars.mds.yandex.net/i?id=e59d7968da3aed795667b0778d96c86f_l-10907478-images-thumbs&n=13",
"https://avatars.mds.yandex.net/i?id=88ccc977190dc9d73f3d898caea4d19d_l-5219096-images-thumbs&n=13",
"https://avatars.mds.yandex.net/i?id=4cb7896f706466099a81276a024ddebf_l-5225342-images-thumbs&n=13",
"https://avatars.mds.yandex.net/i?id=11eabdf694458090418f21c78f442ad0_l-5277647-images-thumbs&ref=rim&n=13&w=736&h=920"
];
// Рандомная картинка в шапке
document.getElementById("headerPhoto").querySelector("img").src=
photos[Math.floor(Math.random()*photos.length)];

// ===== ЯЗЫКИ =====
const locales={
en:{typing:"She is typing...",m1:"Hey...",m2:"Are you alone?",m3:"Let's chat privately...",btn:"Continue chat",online:"users online"},
ru:{typing:"Она печатает...",m1:"Привет...",m2:"Ты один?",m3:"Давай пообщаемся...",btn:"Продолжить чат",online:"пользователей онлайн"}
};
const lang=navigator.language.split("-")[0];
const text=locales[lang]||locales.en;

// ===== ONLINE USERS =====
function updateOnline(){
  let users=120+Math.floor(Math.random()*60);
  document.getElementById("onlineUsers").innerText=users+" "+text.online;
}
updateOnline();
setInterval(updateOnline,5000);

// ===== TYPING =====
const typing=document.getElementById("typing");
typing.style.display="block";
document.getElementById("typingText").innerText=text.typing;
setTimeout(startChat,2000);

// ===== CHAT =====
function startChat(){
  typing.style.display="none";
  const chat=document.getElementById("chat");
  chat.style.display="block";
  setTimeout(()=>{document.getElementById("m1").innerText=text.m1;},800);
  setTimeout(()=>{document.getElementById("m2").innerText=text.m2;},2000);
  setTimeout(()=>{document.getElementById("m3").innerText=text.m3;},3500);
}
document.getElementById("continueBtn").innerText=text.btn;

// ===== ПЕРЕХОД НА DATING =====
document.getElementById("continueBtn").onclick=function(){
  localStorage.setItem("dating_click","1");
  window.location.href=DATING;
};

// ===== ПОКАЗ КАЗИНО =====
function showCasino(){
  const casino=document.getElementById("casinoPopup");
  casino.classList.add("show");
  const btn=casino.querySelector("button");
  btn.classList.add("pulse");
  // Снимаем эффект через 3 секунды
  setTimeout(()=>{btn.classList.remove("pulse");},3000);
}

// ===== РАНДОМНЫЙ ПОКАЗ КАЗИНО ДЛЯ НОВЫХ =====
let delay=8000+Math.random()*6000;
setTimeout(showCasino,delay);

// ===== КАЗИНО ПРИ ВОЗВРАТЕ С DATING =====
function handleReturn(){
  if(localStorage.getItem("dating_click")){
    localStorage.removeItem("dating_click");
    showCasino();
  }
}
window.addEventListener("focus",()=>{ setTimeout(handleReturn,100); });
document.addEventListener("visibilitychange",()=>{ if(!document.hidden) setTimeout(handleReturn,100); });
window.addEventListener("pageshow",()=>{ setTimeout(handleReturn,100); });

// ===== КАЗИНО КНОПКА =====
document.getElementById("casinoBtn").onclick=function(){
  window.location.href=CASINO;
};

// ===== TITLE ANIMATION =====
const titles=["Online","● New message 💬","She is typing...","Online"];
let i=0;
setInterval(function(){
  document.title=titles[i];
  i++;
  if(i>=titles.length){i=0;}
},2000);
</script>
</body>
</html>
